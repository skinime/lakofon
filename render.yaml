# Render Blueprint za Lakofon (besplatni plan, bez trajnog diska).
# Baza i prilozi se resetuju pri redeployu — obavezno podesi SMTP da zahtevi stižu na mejl.
services:
  - type: web
    name: lakofon
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATA_DIR
        value: /data
      # Popuni ove u Render dashboard-u da ti zahtevi stižu na mejl:
      # - key: SMTP_HOST
      #   value: smtp.gmail.com
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   value: tvoj@gmail.com
      # - key: SMTP_PASS
      #   sync: false
      # - key: ADMIN_PASSWORD
      #   sync: false
