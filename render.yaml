# Render Blueprint za Lakofon (besplatni plan, bez trajnog diska).
# Baza i prilozi se resetuju pri redeployu — obavezno podesi SMTP da zahtevi stižu na mejl.
services:
  - type: web
    name: lakofon
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATA_DIR
        value: /data
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        value: re_6pAVPGUo_DJv5f6p7JLVWzpFZsm1wR6D7
      - key: SMTP_FROM
        value: onboarding@resend.dev
      - key: NOTIFY_EMAIL
        value: boskooviic@gmail.com
